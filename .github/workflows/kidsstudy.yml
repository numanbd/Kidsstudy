name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip Android project
        run: |
          echo "Repository files:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root"
            exit 1
          fi

          echo "Found ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted

          echo "Extracted files:"
          find extracted -maxdepth 4 -type f | head -n 100

          PROJECT_DIR=$(find extracted -name "settings.gradle" -type f -printf '%h\n' | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR=$(find extracted -name "build.gradle" -type f -printf '%h\n' | head -n 1)
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "Android project folder not found. settings.gradle/build.gradle missing."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project folder: $PROJECT_DIR"

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KidsStudyPromptHelper-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KidsStudyPromptHelper-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk

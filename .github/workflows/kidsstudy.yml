name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Unzip Android project
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name "gradlew" -type f -printf '%h\n' | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project folder: $PROJECT_DIR"

      - name: Give permission to Gradle
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KidsStudyPromptHelper-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
